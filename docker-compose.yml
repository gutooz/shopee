version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: supplierhub_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-supplierhub}
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - supplierhub_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: supplierhub_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - supplierhub_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplierhub_backend
    restart: unless-stopped
    environment:
      - MONGODB_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/${MONGO_DB:-supplierhub}?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkey-change-in-production-min32chars}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID:-}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY:-}
      - SHOPEE_REDIRECT_URL=${SHOPEE_REDIRECT_URL:-http://localhost:4200/settings/shopee/callback}
      - SHOPEE_ENV=${SHOPEE_ENV:-sandbox}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4200}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - supplierhub_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplierhub_celery
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      - MONGODB_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/${MONGO_DB:-supplierhub}?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkey-change-in-production-min32chars}
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID:-}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY:-}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - supplierhub_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplierhub_celery_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - MONGODB_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/${MONGO_DB:-supplierhub}?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkey-change-in-production-min32chars}
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID:-}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - supplierhub_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=${API_URL:-http://localhost:8000}
    container_name: supplierhub_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - supplierhub_network

  evolution_api:
    image: atendai/evolution-api:v2.2.0
    container_name: supplierhub_evolution
    restart: unless-stopped
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-evolution-api-key}
      - DATABASE_PROVIDER=mongodb
      - DATABASE_CONNECTION_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/evolution?authSource=admin
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/1
    volumes:
      - evolution_data:/evolution/instances
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - supplierhub_network

volumes:
  mongodb_data:
  redis_data:
  evolution_data:

networks:
  supplierhub_network:
    driver: bridge
